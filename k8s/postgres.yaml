apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-volume
  namespace: reimagined-disco
  labels:
    type: local
    app: postgres
spec:
  storageClassName: manual
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: /var/mnt/hdd-data-1/postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-volume-claim
  namespace: reimagined-disco
  labels:
    app: postgres
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: reimagined-disco
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        # Gira come root prima che postgres parta.
        # Necessario perché il hostPath (/var/mnt/hdd-data-1/postgres) è di proprietà di root (uid=0)
        # e postgres (uid=999) non ha i permessi di scrittura sulla directory root del mount.
        # Su Talos non è possibile fare chown sull'host via SSH, quindi si delega all'initContainer.
        - name: fix-permissions
          image: busybox
          command: ['sh', '-c', 'chown -R 999:999 /var/lib/postgresql/data']
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgresdata
      containers:
        - name: postgres
          image: 'postgres:14'
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault # "RuntimeDefault" or "Localhost"
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pgcreds
                  key: PGDATABASE
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pgcreds
                  key: PGUSER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pgcreds
                  key: PGPASSWORD
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgresdata
            #- name: pgconfigfile
            #  mountPath: /app/config.yaml
            #  subPath: config.yaml
      volumes:
        # data
        - name: postgresdata
          persistentVolumeClaim:
            claimName: postgres-volume-claim
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: reimagined-disco
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432