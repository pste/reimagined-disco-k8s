apiVersion: batch/v1
kind: CronJob
metadata:
  name: reimagined-disco-jobs
spec:
  suspend: false
  schedule: "0 10 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: jobs
            image: pirraste/reimagined-disco-jobs:v0
            env:
            - name: LOG_LEVEL
              value: "trace"
              name: API_URL
              value: "http://api-svc.reimagined-disco.svc.cluster.local:3000"
              name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: TOKEN

          