# IMPORTANT: dynamic provisioning (PVC only) does NOT work with read-only shares.
# The SMB CSI driver needs to create a subdirectory at provision time, which
# requires write access. Use static provisioning (PV + PVC) for nas-ro.
# nas-rw supports both static and dynamic provisioning.

apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-usbmusic-nas-ro
spec:
  capacity:
    storage: 256Gi   # nominal, SMB does not enforce quotas
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""   # empty: bypasses the provisioner, binds only to matching PVC
  mountOptions:
    - ro
    - dir_mode=0555
    - file_mode=0444
    - uid=1001
    - gid=1001
    - noperm
    - mfsymlinks
    - cache=strict
    - noserverino
  csi:
    driver: smb.csi.k8s.io
    readOnly: true
    volumeHandle: nasmusic-rd   # must be unique per share in the cluster
    volumeAttributes:
      source: "//192.168.178.210/Music"   # replace with actual NAS IP and share
    nodeStageSecretRef:
      name: nascreds-ro
      namespace: default
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-nas-music-ro
  namespace: reimagined-disco
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  resources:
    requests:
      storage: 256Gi
  volumeName: pv-usbmusic-nas-ro   # binds explicitly to the PV above